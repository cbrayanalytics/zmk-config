## Uncomment the following lines to enable the Corne RGB Underglow
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

## Uncomment the following line to enable the Corne OLED Display
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

## Enable to reduce overall battery consumption.
CONFIG_ZMK_IDLE_TIMEOUT=30000           ## 30 seconds to idle

## Deep sleep support
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000    ## 15 minutes to deep sleep
CONFIG_ZMK_SLEEP=y

## Soft off feature (Make sure wake-up key is configured!!)
CONFIG_ZMK_PM_SOFT_OFF=y

## Battery reporting and features
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60

## Peripheral battery reporting
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

## MacOS specific batter reporting that can cause computer
## to wake from sleep. Disable to prevent
CONFIG_BT_BAS=y
